apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: complyeaze-tools
  labels:
    app.kubernetes.io/name: complyeaze-tools
    app.kubernetes.io/component: static-site
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "64k"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - tools.complyeaze.com
      secretName: complyeaze-tools-tls
  rules:
    - host: tools.complyeaze.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: complyeaze-tools
                port:
                  name: http
