apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: complyeaze-tools-staging
nameSuffix: -staging
resources:
  - ../../base
patches:
  - target:
      kind: Ingress
      name: complyeaze-tools
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: tools-staging.complyeaze.com
      - op: replace
        path: /spec/tls/0/secretName
        value: complyeaze-tools-staging-tls
      - op: replace
        path: /spec/rules/0/host
        value: tools-staging.complyeaze.com
  - target:
      kind: Deployment
      name: complyeaze-tools
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/httpHeaders/0/value
        value: tools-staging.complyeaze.com
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/httpHeaders/0/value
        value: tools-staging.complyeaze.com
