map $uri $cache_control {
  default "no-cache";
  ~^/_astro/ "public, max-age=31536000, immutable";
  =/favicon.svg "public, max-age=86400";
  =/social-card.png "public, max-age=86400";
  =/site.webmanifest "public, max-age=3600";
  =/robots.txt "public, max-age=300, must-revalidate";
  =/sitemap.xml "public, max-age=300, must-revalidate";
  =/llms.txt "public, max-age=300, must-revalidate";
}

server {
  listen 8080;
  server_name tools.complyeaze.com;
  absolute_redirect off;
  port_in_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 64k;

  # Astro static islands emit inline bootstrap scripts/styles; keep network egress
  # disabled while allowing those first-party inline blocks to run.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; style-src-attr 'none'; img-src 'self' data: blob:; font-src 'self'; connect-src 'none'; worker-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; manifest-src 'self'" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=(), clipboard-read=(), clipboard-write=(self)" always;
  add_header Cache-Control $cache_control always;

  location = /-/health {
    access_log off;
    add_header Content-Type "text/plain; charset=utf-8";
    return 200 "ok\n";
  }

  location = /site.webmanifest {
    default_type application/manifest+json;

    limit_except GET HEAD {
      deny all;
    }

    try_files $uri =404;
  }

  location /_astro/ {
    limit_except GET HEAD {
      deny all;
    }

    try_files $uri =404;
  }

  location / {
    limit_except GET HEAD {
      deny all;
    }

    try_files $uri $uri/ =404;
  }
}
