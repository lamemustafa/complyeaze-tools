name: Publish Image

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/lamemustafa/complyeaze-tools

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          file: deploy/docker/Dockerfile
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        if: always()
        with:
          sarif_file: trivy-results.sarif
      - name: Push scanned image
        id: push
        shell: bash
        run: |
          set -euo pipefail
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          digest="$(docker buildx imagetools inspect "${IMAGE_NAME}:${GITHUB_SHA}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
            echo "Could not resolve published image digest." >&2
            exit 1
          fi
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
      - name: Print digest
        run: echo "${{ steps.push.outputs.digest }}"
