name: Deploy Credential Rotation

on:
  schedule:
    - cron: "23 4 1 * *"
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: deploy-credential-rotation
  cancel-in-progress: false

jobs:
  reminder:
    name: Open or update rotation issue
    runs-on: ubuntu-latest
    steps:
      - name: Open or update issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create deploy-credential-rotation --color 7c3aed --description "Production deploy credential rotation" --force
          issue_number="$(gh issue list --state open --label deploy-credential-rotation --json number --jq '.[0].number')"
          body_file="$(mktemp)"
          {
            echo "# Deploy credential rotation"
            echo ""
            echo "Rotate TOOLS_PROD_KUBECONFIG_B64 for the complyeaze-tools production deployer."
            echo ""
            echo "Checklist:"
            echo "- Follow docs/deploy-credential-rotation.md from an admin workstation."
            echo "- Recreate only the namespace-scoped complyeaze-tools-deployer token Secret."
            echo "- Update the GitHub Actions production secret."
            echo "- Run pnpm preflight:live with the current deployed digest."
            echo "- Confirm deploy-production can still inspect the published image and namespace."
            echo "- Revoke the previous token Secret after the new secret is verified."
          } > "$body_file"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --title "Rotate tools production deploy credential" --body-file "$body_file"
          else
            gh issue create --title "Rotate tools production deploy credential" --label deploy-credential-rotation --body-file "$body_file"
          fi
