name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Reviewed source commit SHA that produced the image"
        required: true
        type: string
      image_digest:
        description: "Published image digest, for example sha256:..."
        required: true
        type: string

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: tools-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/lamemustafa/complyeaze-tools
  NAMESPACE: complyeaze-tools

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415 # v4
      - name: Validate digest input
        run: |
          [[ "${{ inputs.source_sha }}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "source_sha must be a 40-character lowercase git SHA" >&2
            exit 1
          }
          [[ "${{ inputs.image_digest }}" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "image_digest must be sha256 plus 64 lowercase hex characters" >&2
            exit 1
          }
      - name: Verify reviewed publish run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list \
            --repo "${{ github.repository }}" \
            --workflow publish-image.yml \
            --commit "${{ inputs.source_sha }}" \
            --status success \
            --json databaseId,headSha,conclusion \
            --jq '.[0].headSha' | grep -Fx "${{ inputs.source_sha }}"
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Verify published image digest
        run: docker buildx imagetools inspect "${{ env.IMAGE_NAME }}@${{ inputs.image_digest }}"
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.TOOLS_PROD_KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Render digest-pinned manifests
        env:
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ inputs.image_digest }}
        run: |
          cp -R deploy/k8s /tmp/complyeaze-tools-k8s
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("/tmp/complyeaze-tools-k8s/base/deployment.yaml")
          rendered, count = re.subn(
              r"ghcr\.io/lamemustafa/complyeaze-tools@sha256:[0-9a-f]{64}",
              os.environ["IMAGE_REF"],
              path.read_text(),
              count=1,
          )
          if count != 1:
              raise SystemExit("expected to replace exactly one image digest placeholder")
          path.write_text(rendered)
          PY
          kubectl kustomize /tmp/complyeaze-tools-k8s/overlays/production > /tmp/complyeaze-tools-full.yaml
      - name: Drop bootstrap-only namespace document
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source = Path("/tmp/complyeaze-tools-full.yaml")
          target = Path("/tmp/complyeaze-tools.yaml")
          documents = [doc for doc in source.read_text().split("---\n") if doc.strip()]
          workload_documents = [
              doc
              for doc in documents
              if not ("kind: Namespace" in doc and "name: complyeaze-tools" in doc)
          ]
          if len(workload_documents) != len(documents) - 1:
              raise SystemExit("expected to drop exactly one namespace document")
          target.write_text("---\n".join(workload_documents))
          PY
      - name: Apply
        run: kubectl -n "${{ env.NAMESPACE }}" apply -f /tmp/complyeaze-tools.yaml
      - name: Rollout
        run: kubectl -n "${{ env.NAMESPACE }}" rollout status deployment/complyeaze-tools --timeout=180s
      - name: Live smoke checks
        run: |
          curl -fsSI https://tools.complyeaze.com/ | grep -i "content-security-policy"
          curl -fsSL https://tools.complyeaze.com/-/health | grep -Fx "ok"
          curl -fsSL https://tools.complyeaze.com/sitemap.xml | grep -F "https://tools.complyeaze.com"
