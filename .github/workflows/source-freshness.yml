name: Source Freshness

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      create_pr_report:
        description: "Create a PR with docs/source-freshness-report.md"
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: source-freshness
  cancel-in-progress: false

jobs:
  stale-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: freshness
        name: Check source freshness
        continue-on-error: true
        run: node scripts/source-freshness.mjs --write-md source-freshness-report.md --write-json source-freshness-report.json --fail-on-stale
      - name: Open or update source freshness issue
        if: steps.freshness.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create source-freshness --color 0c6b58 --description "Official source review required" --force
          issue_number="$(gh issue list --state open --label source-freshness --json number --jq '.[0].number // ""')"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --title "Source freshness review required" --body-file source-freshness-report.md
          else
            gh issue create --title "Source freshness review required" --label source-freshness --body-file source-freshness-report.md
          fi
      - name: Fail when stale
        if: steps.freshness.outcome == 'failure'
        run: exit 1

  report-pr:
    if: github.event_name == 'workflow_dispatch' && inputs.create_pr_report == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/source-freshness.mjs --write-md docs/source-freshness-report.md
      - name: Create report PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="source-freshness-report-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add docs/source-freshness-report.md
          git commit -m "chore: update source freshness report"
          git push origin "$branch"
          gh pr create --title "chore: update source freshness report" --body-file docs/source-freshness-report.md --head "$branch" --base main
