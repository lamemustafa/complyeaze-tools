name: Review findings gate

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: "41 3 * * *"

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: review-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review-gate:
    name: Review gate status sync
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Sync review gate status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ ! -f scripts/sync-review-gate-status.mjs ]; then
            echo "Review gate scripts are not present on the trusted default branch yet; skipping bootstrap event."
            exit 0
          fi

          args=(
            --repo "${GITHUB_REPOSITORY}"
            --run-url "${RUN_URL}"
            --strict-head-review
            --required-review-author chatgpt-codex-connector
          )

          if [ "${EVENT_NAME}" = "schedule" ]; then
            args+=(--all-open --allow-missing-head-review)
          else
            if [ -z "${PR_NUMBER}" ]; then
              echo "Could not determine pull request number." >&2
              exit 1
            fi
            args+=(--pr "${PR_NUMBER}" --allow-missing-head-review)
          fi

          node scripts/sync-review-gate-status.mjs "${args[@]}"
