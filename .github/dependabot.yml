version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-toolchain:
        patterns:
          - astro
          - "@astrojs/*"
          - vite
          - "@vitejs/*"
          - vitest
          - eslint
          - "@eslint/*"
          - typescript-eslint
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      codeql-actions:
        patterns:
          - "github/codeql-action/*"
      ci-actions:
        patterns:
          - "*"
        exclude-patterns:
          - "github/codeql-action/*"
  - package-ecosystem: docker
    directory: /deploy/docker
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
